<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exam Management Tool</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="top-nav">
    <a href="index.html">Teaching Tools Top</a>
    <button id="fullscreenBtn" type="button">Fullscreen</button>
  </header>

  <main class="exam-app" id="examApp">
    <section class="control-panel" id="controlPanel">
      <h1>Exam Management Tool</h1>

      <label for="courseInput">Course Number</label>
      <input id="courseInput" type="text" placeholder="Example: ECON 101" />

      <label for="chartVersion">Seating Chart Version</label>
      <select id="chartVersion">
        <option value="without-door">No door</option>
        <option value="with-door-right">Door on right</option>
        <option value="with-door-left">Door on left</option>
        <option value="with-door-back-center">Door at back center</option>
        <option value="with-door-back-left">Door at back left</option>
      </select>

      <label for="noticeInput">Instructions</label>
      <textarea id="noticeInput" rows="6" placeholder="Enter instructions to display before the exam"></textarea>

      <div class="time-row">
        <label for="durationInput">Exam Duration (minutes)</label>
        <input id="durationInput" type="number" min="1" value="120" />
      </div>

      <div class="button-row">
        <button id="completeBtn" type="button">Complete Setup</button>
      </div>
    </section>

    <section class="pre-exam-view" id="preExamView" aria-live="polite">
      <h2 class="course-title" id="courseTitle">Course Number</h2>
      <figure class="chart-wrap">
        <img id="seatingChartImage" src="images/seating_chart.png" alt="Seating chart" />
      </figure>
      <article class="notice-box">
        <h3>Instructions</h3>
        <p id="noticeText"></p>
      </article>
      <div class="pre-exam-actions hidden" id="preExamActions">
        <button id="backToSettingsBtn" type="button">Back to Settings</button>
        <button id="startFromPreviewBtn" type="button">Start</button>
      </div>
    </section>

    <section class="exam-view hidden" id="examView" aria-live="assertive">
      <div class="current-time" id="currentTime">Current time: 00:00:00</div>
      <div class="end-time" id="endTime">Exam end time: --:--:--</div>
      <div class="timer" id="timerDisplay">120:00</div>
      <article class="exam-notice-box">
        <h3>Instructions</h3>
        <p id="examNoticeText"></p>
      </article>
      <div class="exam-edit-wrap">
        <button id="editInstructionsBtn" type="button">Edit Instructions</button>
        <div class="exam-instruction-editor hidden" id="examInstructionEditor">
          <textarea id="examNoticeInput" rows="4" placeholder="Update instructions while timer is running"></textarea>
          <button id="saveExamInstructionsBtn" type="button">Save</button>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
